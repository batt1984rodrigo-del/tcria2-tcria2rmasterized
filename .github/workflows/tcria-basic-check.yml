name: TCRIA Basic Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  basic-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install reportlab

      - name: Render example report
        run: |
          python scripts/render_report_example.py

      - name: Verify report artifacts
        run: |
          test -f docs/report-example.md
          test -f output/pdf/tcria-compliance-report-example.pdf
